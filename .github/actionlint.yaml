---
self-hosted-runner:
  labels:
    - ubuntu-slim

paths:
  # Ignore shellcheck errors in gh-aw auto-generated lock files.
  # These are compiled by `gh aw compile` and should not be manually
  # edited or linted.
  .github/workflows/*.lock.yml:
    ignore:
      - 'shellcheck reported issue in this script: SC2086:.+'
      - 'shellcheck reported issue in this script: SC2015:.+'
      - 'shellcheck reported issue in this script: SC2129:.+'
