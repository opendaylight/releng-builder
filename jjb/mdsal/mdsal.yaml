---
- project:
    name: mdsal-master
    jobs:
      - odl-maven-jobs-jdk21
      - odl-maven-verify-jobs-jdk21:
          disable-job: true
      - gerrit-release-merge:
          build-node: ubuntu2204-builder-2c-1g
          build-timeout: 120

    project: mdsal
    project-name: mdsal
    branch: master
    stream: master
    build-node: ubuntu2204-docker-4c-4g

    mvn-settings: "mdsal-settings"
    build-timeout: 60

    # Used by the release job
    staging-profile-id: a674173c7b29d

- project:
    name: mdsal-15.0.x
    jobs:
      - odl-maven-jobs-jdk21
      - odl-maven-verify-jobs-jdk21
      - gerrit-release-merge:
          build-node: ubuntu2204-builder-2c-1g
          build-timeout: 120

    project: mdsal
    project-name: mdsal
    branch: 15.0.x
    stream: vanadium
    build-node: ubuntu2204-docker-4c-4g

    mvn-settings: "mdsal-settings"
    build-timeout: 60

    # Used by the release job
    staging-profile-id: a674173c7b29d

- project:
    name: mdsal-14.0.x
    jobs:
      - odl-maven-jobs-jdk21
      - odl-maven-verify-jobs-jdk21
      - gerrit-release-merge:
          build-node: ubuntu2204-builder-2c-1g
          build-timeout: 120

    project: mdsal
    project-name: mdsal
    branch: 14.0.x
    stream: 14.0.x
    build-node: ubuntu2204-docker-4c-4g

    mvn-settings: "mdsal-settings"
    build-timeout: 60

    # Used by the release job
    staging-profile-id: a674173c7b29d

- project:
    name: mdsal-sonar
    jobs:
      - odl-sonar-jobs-jdk21:
          mvn-params: >
            -Dodl.jacoco.aggregateFile=$WORKSPACE/target/jacoco.exec
            -Dskip.karaf.featureTest=true
          sonar-mvn-goal: >
            jacoco:report -Djacoco.dataFile=$WORKSPACE/target/jacoco.exec
            sonar:sonar

    project: "mdsal"
    project-name: "mdsal"
    branch: "master"
    build-node: ubuntu2204-docker-4c-4g

    mvn-settings: "mdsal-settings"
    mvn-goals: "clean deploy"
    mvn-opts: "-Dintegrationtests"

- project:
    name: mdsal-view
    views:
      - project-view
    project-name: mdsal
