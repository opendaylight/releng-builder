---
- project:
    name: infrautils-master
    jobs:
      - gerrit-maven-merge:
          disable-job: true
          java-version: openjdk21
          mvn-version: mvn39
          build-timeout: 180
      - gerrit-maven-clm:
          nexus-iq-namespace: odl-
          nexus-iq-stage: release
          mvn-opts: "--add-opens java.base/java.util=ALL-UNNAMED"
          java-version: openjdk21
          mvn-version: mvn39
      - gerrit-maven-stage:
          sbom-generator: true
          sign-artifacts: true
          cron: ""
          java-version: openjdk21
          mvn-version: mvn39
      - gerrit-maven-mri-stage:
          sbom-generator: true
          sign-artifacts: true
          cron: ""
          java-version: openjdk21
          mvn-version: mvn39
      - odl-maven-verify-jobs-jdk21:
	  disable-job: true

    project: infrautils
    project-name: infrautils
    stream: master
    branch: master
    build-node: ubuntu2204-docker-2c-2g

    mvn-settings: "infrautils-settings"

    dependencies: "odlparent-merge-{stream}"
    email-upstream: "[infrautils] [odlparent]"

    # Used by the release job
    staging-profile-id: 96fca0367756c

- project:
    name: infrautils-release-management
    jobs:
      - gerrit-release-merge

    project: infrautils
    project-name: infrautils

    build-node: ubuntu2204-builder-2c-1g
    mvn-settings: infrautils-settings
    # Needs to be rather long until we sort out the performance of
    # https://nexus.opendaylight.org/content/repositories/opendaylight.release/org/opendaylight/
    build-timeout: 60

- project:
    name: infrautils-sonar
    jobs:
      - odl-sonar-jobs-jdk21:
          mvn-params: >
            -Dodl.jacoco.aggregateFile=$WORKSPACE/target/jacoco.exec
            -Dskip.karaf.featureTest=true
          sonar-mvn-goal: >
            jacoco:report -Djacoco.dataFile=$WORKSPACE/target/jacoco.exec
            sonar:sonar

    project: "infrautils"
    project-name: "infrautils"
    branch: "master"
    build-node: ubuntu2204-docker-2c-2g

    mvn-settings: "infrautils-settings"

- project:
    name: infrautils-info
    jobs:
      - gerrit-info-yaml-verify:
          disable-job: true
    project: infrautils
    project-name: infrautils
    branch: master
    build-node: ubuntu2204-builder-2c-1g

- project:
    name: infrautils-view
    views:
      - project-view
    project-name: infrautils
