---
- project:
    name: controller-master
    jobs:
      - odl-maven-jobs-jdk21
      - odl-maven-verify-jobs-jdk21:
          disable-job: true
      - gerrit-release-merge:
          build-node: ubuntu2204-builder-2c-1g
          build-timeout: 120

    project: controller
    project-name: controller
    stream: master
    branch: master
    build-node: ubuntu2204-docker-4c-4g

    mvn-settings: "controller-settings"
    mvn-goals: "clean deploy -Pdocs"
    dependencies: "odlparent-merge-{stream},yangtools-merge-{stream},aaa-merge-{stream}"
    email-upstream: "[controller] [odlparent] [yangtools] [aaa]"

    # Used by the release job
    staging-profile-id: 96c1c9177efdd

- project:
    name: controller-12.0.x
    jobs:
      - odl-maven-jobs-jdk21
      - odl-maven-verify-jobs-jdk21
      - gerrit-release-merge:
          build-node: ubuntu2204-builder-2c-1g
          build-timeout: 120

    project: controller
    project-name: controller
    stream: 12.0.x
    branch: 12.0.x
    build-node: ubuntu2204-docker-4c-4g

    mvn-settings: "controller-settings"
    mvn-goals: "clean deploy -Pdocs"
    dependencies: "odlparent-merge-{stream},yangtools-merge-{stream},aaa-merge-{stream}"
    email-upstream: "[controller] [odlparent] [yangtools] [aaa]"

    # Used by the release job
    staging-profile-id: 96c1c9177efdd

- project:
    name: controller-11.0.x
    jobs:
      - odl-maven-jobs-jdk21
      - odl-maven-verify-jobs-jdk21
      - gerrit-release-merge:
          build-node: ubuntu2204-builder-2c-1g
          build-timeout: 120

    project: controller
    project-name: controller
    stream: 11.0.x
    branch: 11.0.x
    build-node: ubuntu2204-docker-4c-4g

    mvn-settings: "controller-settings"
    mvn-goals: "clean deploy -Pdocs"
    dependencies: "odlparent-merge-{stream},yangtools-merge-{stream},aaa-merge-{stream}"
    email-upstream: "[controller] [odlparent] [yangtools] [aaa]"

    # Used by the release job
    staging-profile-id: 96c1c9177efdd

- project:
    name: controller-sonar
    jobs:
      - odl-sonar-jobs-jdk21:
          mvn-params: >
            -Dodl.jacoco.aggregateFile=$WORKSPACE/target/jacoco.exec
            -Dskip.karaf.featureTest=true
          sonar-mvn-goal: >
            jacoco:report -Djacoco.dataFile=$WORKSPACE/target/jacoco.exec
            sonar:sonar

    project: controller
    project-name: controller
    branch: master
    build-node: ubuntu2204-docker-4c-4g

    mvn-settings: "controller-settings"
    mvn-goals: "clean deploy -Pintegrationtests,docs"

- project:
    name: controller-view
    views:
      - project-view
    project-name: controller
