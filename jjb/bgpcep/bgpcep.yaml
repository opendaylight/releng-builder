---
- project:
    name: bgpcep-master
    jobs:
      - gerrit-tox-verify:
          parallel: true
      - odl-maven-javadoc-jobs-jdk21
      - odl-maven-jobs-jdk21
      - odl-maven-verify-jobs-jdk21:
          disable-job: true
      - gerrit-release-merge:
          build-node: ubuntu2204-builder-2c-1g
          build-timeout: 120

    project: bgpcep
    project-name: bgpcep
    stream: master
    branch: master
    build-node: ubuntu2204-docker-8c-8g
    build-timeout: 120

    mvn-settings: "bgpcep-settings"
    dependencies: >
      odlparent-merge-{stream},
      yangtools-merge-{stream},
      controller-merge-{stream},
      mdsal-merge-{stream}
    email-upstream: "[bgpcep] [odlparent] [yangtools] [controller] [mdsal]"
    # Used by the release job
    staging-profile-id: 9427a05049030

- project:
    name: bgpcep-0.23.x
    jobs:
      - gerrit-tox-verify:
          parallel: true
      - odl-maven-javadoc-jobs-jdk21
      - odl-maven-jobs-jdk21
      - odl-maven-verify-jobs-jdk21
      - gerrit-release-merge:
          build-node: ubuntu2204-builder-2c-1g
          build-timeout: 120

    project: bgpcep
    project-name: bgpcep
    stream: 0.23.x
    branch: 0.23.x
    build-node: ubuntu2204-docker-8c-8g
    build-timeout: 120

    mvn-settings: "bgpcep-settings"
    dependencies: >
      odlparent-merge-{stream},
      yangtools-merge-{stream},
      controller-merge-{stream},
      mdsal-merge-{stream}
    email-upstream: "[bgpcep] [odlparent] [yangtools] [controller] [mdsal]"
    # Used by the release job
    staging-profile-id: 9427a05049030

- project:
    name: bgpcep-sonar
    jobs:
      - odl-sonar-jobs-jdk21:
          mvn-params: >
            -Dodl.jacoco.aggregateFile=$WORKSPACE/target/jacoco.exec
            -P!karaf
          sonar-mvn-goal: >
            jacoco:report -Djacoco.dataFile=$WORKSPACE/target/jacoco.exec
            sonar:sonar

    project: bgpcep
    project-name: bgpcep
    branch: master
    build-node: ubuntu2204-docker-4c-4g
    build-timeout: 120
    mvn-settings: "bgpcep-settings"
    mvn-opts: "-Xmx1024m"

- project:
    name: bgpcep-view
    views:
      - project-view
    project-name: bgpcep
